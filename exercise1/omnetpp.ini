# ============================================================
# omnetpp.ini — 练习 1：用 ini 文件覆盖 NED 参数
# ============================================================
#
# 【本练习新概念】ini 参数赋值语法
#
# 格式：  <模块路径通配符>.<参数名> = <值>
#
# 模块路径通配符规则：
#   *         匹配任意单级名称
#   **        匹配任意多级路径
#   具体名称  精确匹配
#
# 例如：
#   **.waitTime = 1.0          给所有模块的 waitTime 赋值
#   *.nodeA.waitTime = 0.5     给顶层网络下名为 nodeA 的模块赋值
#   PingPongNetwork.nodeB.waitTime = 1.5   完整路径精确赋值
# ============================================================

[General]
network = PingPongNetwork
sim-time-limit = 20s
cmdenv-express-mode = false
cmdenv-autoflush = true

# --------------------------------------------------------
# 【核心演示】用 ini 覆盖 NED 里的参数值
#
# Network.ned 里给 nodeA 和 nodeB 都设了 0.8 秒，
# 下面两行会覆盖那个值：
#   nodeA 用 0.5 秒（更快回复）
#   nodeB 用 1.5 秒（更慢回复）
#
# 改这两个数字，不需要重新编译，直接重新运行即可生效。
# 这就是"参数化"的价值：把可变配置从代码里解耦出来。
# --------------------------------------------------------
*.nodeA.waitTime = 5.5
*.nodeB.waitTime = 6.5
