# ============================================================
# omnetpp.ini — OMNeT++ 仿真配置文件
# ============================================================
#
# 这个文件告诉仿真引擎：
#   · 运行哪个网络
#   · 仿真多长时间
#   · 用哪种界面（命令行还是图形界面）
#   · 以及各种运行参数
#
# 格式说明：
#   [SectionName]   — 配置段
#   key = value     — 键值对
#   #               — 注释
# ============================================================

[General]

# network：指定要仿真的顶层网络名，必须与 Network.ned 里的 network 名一致。
network = PingPongNetwork

# sim-time-limit：仿真运行的最大时长。
# 到达这个时间后，引擎自动停止仿真并退出。
# 单位：s（秒）、ms（毫秒）、us（微秒）等。
sim-time-limit = 10s

# cmdenv-express-mode：命令行模式下的输出方式。
# false = 详细模式，每个事件都打印日志（适合调试）
# true  = 精简模式，只显示进度（适合大规模仿真）
cmdenv-express-mode = false

# OMNeT++ 6.x 默认使用 Qtenv（图形界面）。
# 下面这行强制使用 Cmdenv（命令行），方便在终端直接观察日志。
# 如果想用图形界面，把这行注释掉，然后不加 -u 参数运行即可。
cmdenv-autoflush = true
