[General]
network = TrafficShaping
sim-time-limit = 10s
cmdenv-express-mode = false
cmdenv-autoflush = true

# Sink 标签（用于区分两路输出）
*.sinkTB.label = "TokenBucket路径"
*.sinkLB.label = "LeakyBucket路径"

# 流量源：ON 期 1000 pkt/s，突发明显
**.gen.onTime   = 0.5s
**.gen.offTime  = 0.3s
**.gen.sendRate = 1000
**.gen.pktSize  = 512

# 令牌桶：填充速率 500/s，桶容量 50
**.tb.bucketSize = 50
**.tb.tokenRate  = 500

# 漏桶：输出速率 500/s，队列容量 50
**.lb.bucketSize = 50
**.lb.drainRate  = 500
