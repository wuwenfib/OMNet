[General]
network = SimpleRouterNetwork
sim-time-limit = 10s
cmdenv-express-mode = false
cmdenv-autoflush = true

# Sender 配置
*.sender.srcAddr  = 1
*.sender.interval = 1.0

# SimpleRouter 本机地址（题目要求的 "address" 参数）
*.router.address = 5

# 路由表：从配置文件注入，取代旧版在 C++ 里硬编码的 {10->out[0], 20->out[1]}
# 格式："destAddr:gateIdx" 多条用空格或逗号分隔
*.router.routingTable = "10:0 20:1 30:2"

# 两个接收端的地址，与上面的路由表条目对应
*.receiver0.address = 10
*.receiver1.address = 20
*.receiver2.address = 30