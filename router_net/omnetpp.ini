[General]
network = RouterNetwork
sim-time-limit = 60s
cmdenv-autoflush = true

# —— 主机地址 ——
*.h1.address = 1
*.h2.address = 2
*.h3.address = 3

# —— 路由器地址 ——
*.r1.address = 10
*.r2.address = 20
*.r3.address = 30

# 默认发包节奏（指数分布均值 1s）
*.h*.interArrivalMean = 1s
*.h*.initialTtl       = 8

# ============================================================
# [Normal] —— 全部路由表正常配齐，3 台主机互发互收
# ============================================================
[Config Normal]
description = "标准多跳路由：3 主机互相通信"
cmdenv-express-mode = false

# r1.port[0]=h1, port[1]=r2
*.r1.routingTable = "1:0, 2:1, 3:1"

# r2.port[0]=r1, port[1]=r3, port[2]=h2
*.r2.routingTable = "1:0, 2:2, 3:1"

# r3.port[0]=r2, port[1]=h3
*.r3.routingTable = "1:0, 2:0, 3:1"

# 三台主机都既是源也是接收端，每个互相把对方当目标
*.h1.destinations = "2,3"
*.h2.destinations = "1,3"
*.h3.destinations = "1,2"

# ============================================================
# [DefaultRoute] —— 故意把 r1、r3 的路由表缩到只剩本地接入项，
# 其它目的地全靠 defaultPort 回到 r2 中继
# ============================================================
[Config DefaultRoute]
description = "默认路由：边路由不知具体走向，靠 default 回到核心 r2"
cmdenv-express-mode = false

# r1 只知道"自己端 h1 在 port[0]"，别的地址全部由 default port[1] (→ r2) 接力
*.r1.routingTable = "1:0"
*.r1.defaultPort  = 1

# r2 仍然是完整路由表（核心节点）
*.r2.routingTable = "1:0, 2:2, 3:1"

# r3 只认识本地 h3
*.r3.routingTable = "3:1"
*.r3.defaultPort  = 0

*.h1.destinations = "2,3"
*.h2.destinations = "1,3"
*.h3.destinations = "1,2"

# ============================================================
# [TtlLoop] —— 让 r1 和 r2 互踢一个不存在的目的地址 99，
#   观察 TTL 从 8 一路减到 0，最终被 ttlExpired 信号统计到。
#   只用 h1 发包，方便单线观察。
# ============================================================
[Config TtlLoop]
description = "TTL 防环：r1↔r2 互相把 dest=99 踢来踢去，TTL 触发丢弃"
cmdenv-express-mode = false
sim-time-limit = 10s

# r1 把 dest=99 抛给 r2，r2 又抛回 r1 —— 死循环
*.r1.routingTable = "1:0, 99:1"
*.r2.routingTable = "99:0"
*.r3.routingTable = ""           # 这条用不到

*.h1.destinations    = "99"
*.h1.interArrivalMean = 2s
*.h1.initialTtl       = 6        # TTL=6 → 6 跳后丢弃，便于看到链路

*.h2.destinations = ""
*.h3.destinations = ""
