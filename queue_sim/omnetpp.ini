[General]
network = QueueNetwork
sim-time-limit = 1000s

# express 模式：不逐事件打印，1000s 仿真瞬间跑完。
# 它会屏蔽 EV 日志，所以各模块的统计汇总改用 std::cout 打印（始终可见）。
cmdenv-express-mode = true
cmdenv-autoflush = true

# 队列容量两组配置通用
*.queueServer.queueCapacity = 5

# ---- Normal：负载因子 rho = 0.8/1.0 = 0.8，系统稳定 ----
[Config Normal]
*.generator.interArrivalMean   = 1.0
*.queueServer.serviceTimeMean  = 0.8

# ---- Overload：负载因子 rho = 1.5/1.0 = 1.5，队列饱和 ----
[Config Overload]
*.generator.interArrivalMean   = 1.0
*.queueServer.serviceTimeMean  = 1.5
